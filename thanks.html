<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Файл отправлен — PG Audit</title>
<meta name="robots" content="noindex">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0b0d11; color: #e1e4eb;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    background: #161a24; border: 1px solid #1e2433; border-radius: 12px;
    padding: 48px 40px; text-align: center; max-width: 480px; width: 90%;
  }
  .icon { font-size: 48px; margin-bottom: 20px; }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
  p { font-size: 15px; color: #8b93a7; line-height: 1.7; margin-bottom: 8px; }
  .email-note { margin-top: 16px; font-size: 13px; color: #5c6478; }
  .link { color: #3b82f6; text-decoration: none; }
  .link:hover { text-decoration: underline; }
  .back { margin-top: 32px; display: inline-block; }
  .back a {
    color: #3b82f6; text-decoration: none; font-size: 14px; font-weight: 500;
    border: 1px solid #2a3146; padding: 10px 24px; border-radius: 8px;
    transition: all 0.2s;
  }
  .back a:hover { border-color: #3b82f6; background: rgba(59,130,246,0.08); }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">&#10003;</div>
    <h1>Файл отправлен</h1>
    <p>Мы получили ваш запрос. Результат оценки придёт на указанный email в течение 24 часов.</p>
    <p class="email-note">Если у вас несколько баз данных — можно отправить файлы для каждой отдельно.</p>
    <div class="back"><a href="/">Вернуться на главную</a></div>
  </div>
</body>
</html>
